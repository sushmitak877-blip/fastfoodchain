<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Call Manager</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
    color:#333;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#444;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}

input, button, select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

button{
    background:#6c63ff;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#574fd6;
}

.call-btn{
    background:#28a745;
}

.call-btn:hover{
    background:#1e7e34;
}

.auto-btn{
    background:#ff9800;
}

.stop-btn{
    background:#dc3545;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    overflow:hidden;
    border-radius:10px;
}

th{
    background:#6c63ff;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f3f3f3;
}

.status-input{
    width:100%;
    padding:6px;
    border-radius:5px;
    border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">
    <h1>📞 Smart Excel Call Manager</h1>

    <div class="controls">
        <input type="file" id="fileInput" accept=".xlsx,.xls">

        <input type="text" id="name" placeholder="Name">
        <input type="text" id="phone" placeholder="Phone">
        <input type="text" id="info" placeholder="Info">

        <button onclick="addManual()">Add</button>

        <select id="delay">
            <option value="5000">5 sec delay</option>
            <option value="10000">10 sec delay</option>
            <option value="15000">15 sec delay</option>
        </select>

        <button class="auto-btn" onclick="startAutoCall()">▶ Auto Call</button>
        <button class="stop-btn" onclick="stopAutoCall()">⏹ Stop</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Info</th>
                <th>Status</th>
                <th>Call</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>

let data = [];
let autoIndex = 0;
let autoRunning = false;
let autoTimer = null;

// Upload Excel
document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        const workbook = XLSX.read(e.target.result, {type:'binary'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet);

        data = jsonData.map(row => ({
            Name: row.Name || '',
            Phone: row.Phone || '',
            Info: row.Info || '',
            Status: ''
        }));

        render();
    };

    reader.readAsBinaryString(file);
});

// Render Table
function render(){
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    data.forEach((row,index)=>{
        let tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${row.Name}</td>
            <td>${row.Phone}</td>
            <td>${row.Info}</td>
            <td>
                <input class="status-input" 
                value="${row.Status || ''}" 
                onchange="updateStatus(${index}, this.value)">
            </td>
            <td>
                <button class="call-btn" onclick="callNumber('${row.Phone}')">Call</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

// Manual Add
function addManual(){
    let name = document.getElementById('name').value;
    let phone = document.getElementById('phone').value;
    let info = document.getElementById('info').value;

    if(!phone){ alert("Enter phone number"); return; }

    data.push({Name:name, Phone:phone, Info:info, Status:''});
    render();
}

// Update Status
function updateStatus(index, value){
    data[index].Status = value;
}

// Call
function callNumber(phone){
    window.location.href = `tel:${phone}`;
}

// AUTO CALL SYSTEM
function startAutoCall(){
    if(data.length === 0){
        alert("No data available");
        return;
    }

    autoRunning = true;
    autoIndex = 0;
    runAutoCall();
}

function runAutoCall(){
    if(!autoRunning || autoIndex >= data.length) return;

    let delay = document.getElementById('delay').value;
    let phone = data[autoIndex].Phone;

    if(phone){
        window.location.href = `tel:${phone}`;
    }

    autoIndex++;

    autoTimer = setTimeout(runAutoCall, delay);
}

function stopAutoCall(){
    autoRunning = false;
    clearTimeout(autoTimer);
}

</script>

</body>
</html>
