<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Call Manager</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Glass Card */
.card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:15px;
    width:95%;
    max-width:1000px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Login */
#loginBox{
    text-align:center;
}

#loginBox input{
    width:100%;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border:none;
}

#loginBox button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#6c63ff;
    color:white;
    cursor:pointer;
}

/* Main App */
#app{
    display:none;
}

/* Header */
h1{
    text-align:center;
    margin-bottom:15px;
    color:white;
}

/* Controls */
.controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-bottom:15px;
}

/* Buttons */
button{
    padding:10px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
    font-size:13px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.upload-btn{background:#6c63ff;}
.export-btn{background:#17a2b8;}
.auto-btn{background:#ff9800;}
.stop-btn{background:#dc3545;}
.call-btn{background:#28a745;}
.disconnect-btn{background:#444;}

/* Inputs */
input,select{
    padding:8px;
    border-radius:6px;
    border:none;
    font-size:13px;
}

/* Table */
.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#6c63ff;
    color:white;
    padding:10px;
}

td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f3f3f3;
}

.status-input{
    width:100%;
}

/* Mobile */
@media(max-width:600px){
    button,input{flex:1;}
}
</style>
</head>

<body>

<div class="card">

<!-- LOGIN -->
<div id="loginBox">
    <h2 style="color:white;">🔐 Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<h1>📞 Smart Call Manager</h1>

<div class="controls">

<button class="upload-btn" onclick="document.getElementById('fileInput').click()">📤 Upload</button>
<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">

<button class="export-btn" onclick="exportExcel()">📥 Export</button>

<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="info" placeholder="Info">

<button onclick="addManual()">Add</button>

<select id="delay">
<option value="5000">5s</option>
<option value="10000">10s</option>
<option value="15000">15s</option>
</select>

<button class="auto-btn" onclick="startAutoCall()">▶ Auto</button>
<button class="stop-btn" onclick="stopAutoCall()">⏹ Stop</button>
<button class="disconnect-btn" onclick="disconnectCall()">📴 Disconnect</button>

</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Info</th>
<th>Status</th>
<th>Call</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>

// LOGIN (simple)
function login(){
    let user = document.getElementById('username').value;
    let pass = document.getElementById('password').value;

    if(user==="admin" && pass==="1234"){
        document.getElementById('loginBox').style.display='none';
        document.getElementById('app').style.display='block';
    }else{
        alert("Wrong login");
    }
}

// ===== YOUR SAME LOGIC BELOW =====

let data = JSON.parse(localStorage.getItem('callData')) || [];
let autoIndex = 0;
let autoRunning = false;
let autoTimer = null;

function saveData(){
    localStorage.setItem('callData', JSON.stringify(data));
}

function render(){
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    data.forEach((row,i)=>{
        tbody.innerHTML += `
        <tr>
            <td>${row.Name}</td>
            <td>${row.Phone}</td>
            <td>${row.Info}</td>
            <td>
                <input class="status-input"
                value="${row.Status || ''}"
                onchange="updateStatus(${i},this.value)">
            </td>
            <td>
                <button class="call-btn" onclick="callNumber('${row.Phone}')">Call</button>
            </td>
        </tr>`;
    });

    saveData();
}

document.getElementById('fileInput').addEventListener('change', function(e){
    const reader = new FileReader();

    reader.onload = function(e){
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        data = json.map(r => ({
            Name:r.Name || '',
            Phone:r.Phone || '',
            Info:r.Info || '',
            Status:''
        }));

        render();
    };

    reader.readAsBinaryString(e.target.files[0]);
});

function addManual(){
    let nameValue = document.getElementById('name').value;
    let phoneValue = document.getElementById('phone').value;
    let infoValue = document.getElementById('info').value;

    if(!phoneValue){
        alert("Enter phone number");
        return;
    }

    data.push({Name:nameValue,Phone:phoneValue,Info:infoValue,Status:''});

    document.getElementById('name').value='';
    document.getElementById('phone').value='';
    document.getElementById('info').value='';

    render();
}

function updateStatus(i,val){
    data[i].Status = val;
    saveData();
}

function callNumber(phone){
    window.location.href = `tel:${phone}`;
}

function disconnectCall(){
    alert("📴 Please manually end call from phone");
}

function startAutoCall(){
    if(data.length===0){alert("No data");return;}
    autoRunning=true;
    autoIndex=0;
    runAuto();
}

function runAuto(){
    if(!autoRunning || autoIndex>=data.length) return;

    let delay=document.getElementById('delay').value;
    let phone=data[autoIndex].Phone;

    if(phone){
        window.location.href=`tel:${phone}`;
    }

    autoIndex++;
    autoTimer=setTimeout(runAuto,delay);
}

function stopAutoCall(){
    autoRunning=false;
    clearTimeout(autoTimer);
}

function exportExcel(){
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Calls");
    XLSX.writeFile(wb, "Call_Data.xlsx");
}

render();

</script>

</body>
</html>
